# Full stack: Next.js app + PostgreSQL + Redis.
# On Coolify: no app port here so host 3000 is free; Coolify proxy routes via domain.
# Locally: docker-compose.override.yml adds ports so you get http://localhost:3000.
# Postgres (host): port 5433 to avoid conflict with local PostgreSQL on 5432.

services:
  postgres:
    image: postgres:16-alpine
    container_name: susu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: susu
      POSTGRES_PASSWORD: susu_local
      POSTGRES_DB: susu_system
    ports:
      - "5433:5432"
    volumes:
      - susu_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U susu -d susu_system"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: susu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - susu_redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: susu-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://susu:susu_local@postgres:5432/susu_system
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push &&
             npx prisma db seed &&
             exec node server.js"

volumes:
  susu_pgdata: {}
  susu_redisdata: {}
